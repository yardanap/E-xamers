name: Build Mac App

on:
  push:
    branches: [ "main" ]

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyQt6==6.6.1 pyinstaller

    - name: Build app
      run: |
        pyinstaller main.py --windowed --onefile --collect-all PyQt6

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: mac-app
        path: dist/
