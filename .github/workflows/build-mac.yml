name: Build Mac App

on:
  push:
    branches: [ "main" ]

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyQt6==6.6.1 pyinstaller

    - name: Build app
      run: |
        pyinstaller main.py \
        --clean \
        --onefile \
        --windowed \
        --name "E-xamers" \
        --collect-all PyQt6 \
        --add-data "assets/main_asset:assets/main_asset" \
        --add-data "src/ui:src/ui" \
        --add-data "assets/db_credential/users.csv:assets/db_credential"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: mac-app
        path: dist/
